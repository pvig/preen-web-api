server:
  error:
    include-stacktrace: never
    include-exception: false

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/preenwebapi}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  application:
    name: preenWebApi
  jackson:
    serialization:
      write-dates-as-timestamps: false
logging:
  level:
    root: INFO
    org.springframework.security: DEBUG # Active le détail de la sécurité
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-random-256-bit-key-in-production!!}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
  refresh-token:
    expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}
